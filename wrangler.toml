# wrangler.toml — ncm-am-worker
name = "ncm-am-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["10 22 * * *"]  # UTC 22:10 = 北京时间 06:10

# ── KV namespace ──
# 创建: wrangler kv namespace create NCM_AM
# 把输出的 ID 填入下方
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_ID"
