# wrangler.toml — ncm-am-worker
name = "ncm-am-worker"
main = "src/index.ts"
compatibility_date = "2026-05-07"

[build]
command = "npm run build"

[assets]
directory = "./web-dist"
not_found_handling = "single-page-application"
run_worker_first = ["/sync*", "/session*", "/status*", "/login*", "/subscribe*", "/vapid-key*", "/search*", "/sw.js", "/__scheduled*"]

[triggers]
crons = ["30 22 * * *"]  # 06:30 UTC+8 daily

# ── KV namespace ──
[[kv_namespaces]]
binding = "KV"
id = "df71033b4214488791fb25de4729019f"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# ── Secrets (set via wrangler secret put) ──
# NCM_COOKIE    — 网易云 cookie (MUSIC_U=xxx; __csrf=yyy)
# AM_DEVELOPER_TOKEN — Apple Music JWT
# AM_USER_TOKEN — Apple Music media-user-token
# SYNC_TOKEN    — 同步 API 访问令牌 (用于网页鉴权)
