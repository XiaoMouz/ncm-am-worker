<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCM→AM 同步通知</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    p { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-subscribe {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .btn-subscribe:hover { transform: scale(1.02); }
    .btn-subscribe:disabled {
      background: #333;
      cursor: not-allowed;
      transform: none;
    }
    .btn-unsubscribe {
      background: transparent;
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
      margin-top: 12px;
    }
    .status {
      margin-top: 16px;
      font-size: 13px;
      padding: 8px;
      border-radius: 8px;
    }
    .status.ok { background: #1a3a1a; color: #4ade80; }
    .status.err { background: #3a1a1a; color: #ff6b6b; }
    .status.info { background: #1a1a3a; color: #60a5fa; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎵</div>
    <h1>NCM → AM 每日同步</h1>
    <p>订阅推送通知，每天同步完成后收到浏览器通知</p>
    <button id="btn-sub" class="btn btn-subscribe" onclick="doSubscribe()">
      开启通知
    </button>
    <button id="btn-unsub" class="btn btn-unsubscribe hidden" onclick="doUnsubscribe()">
      取消订阅
    </button>
    <div id="status" class="status hidden"></div>
  </div>

  <script>
    const VAPID_PUBLIC_KEY = '{{VAPID_PUBLIC_KEY}}';

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      return Uint8Array.from(rawData, c => c.charCodeAt(0));
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
      el.classList.remove('hidden');
    }

    async function checkSubscription() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        showStatus('浏览器不支持推送通知', 'err');
        document.getElementById('btn-sub').disabled = true;
        return;
      }

      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        document.getElementById('btn-sub').classList.add('hidden');
        document.getElementById('btn-unsub').classList.remove('hidden');
        showStatus('✅ 已订阅', 'ok');
      }
    }

    async function doSubscribe() {
      const btn = document.getElementById('btn-sub');
      btn.disabled = true;
      btn.textContent = '请求权限中...';

      try {
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          showStatus('❌ 通知权限被拒绝', 'err');
          btn.disabled = false;
          btn.textContent = '开启通知';
          return;
        }

        btn.textContent = '订阅中...';
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
        });

        const resp = await fetch('/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub.toJSON()),
        });

        if (resp.ok) {
          showStatus('✅ 订阅成功！每天同步后会推送通知', 'ok');
          document.getElementById('btn-sub').classList.add('hidden');
          document.getElementById('btn-unsub').classList.remove('hidden');
        } else {
          showStatus('❌ 订阅失败: ' + await resp.text(), 'err');
          btn.disabled = false;
          btn.textContent = '开启通知';
        }
      } catch (e) {
        showStatus('❌ ' + e.message, 'err');
        btn.disabled = false;
        btn.textContent = '开启通知';
      }
    }

    async function doUnsubscribe() {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        const endpoint = sub.endpoint;
        await sub.unsubscribe();
        await fetch('/subscribe', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint }),
        });
      }
      document.getElementById('btn-sub').classList.remove('hidden');
      document.getElementById('btn-sub').disabled = false;
      document.getElementById('btn-unsub').classList.add('hidden');
      showStatus('已取消订阅', 'info');
    }

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(checkSubscription);
    }
  </script>
</body>
</html>
